name: Latest blog post workflow
on:
  schedule: # 定时触发 - 每小时执行一次
    # UTC 时间每小时 0 分执行 = 北京时间 (UTC+8) 每小时 0 分
    - cron: '0 * * * *'
  workflow_dispatch: # 允许手动触发工作流
  repository_dispatch: # 接收来自 hexo-blog 仓库的跨仓库更新信号
    types: [update-blog-posts]
permissions:
  contents: write # To write the generated contents to the readme

jobs:
  update-readme-with-blog:
    name: Update this repo's README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Pull in blog posts (citation style)
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          comment_tag_name: "BLOG-POST-LIST-CITE"
          feed_list: "https://vanilla-chan.cn/blog/atom.xml"
          max_post_count: "5"
          template: "- [$title]($url), `$date`$newline"
          date_format: "UTC:yyyy-mm-dd HH:MM"
          # item_exec: "post.date = new Date(post.date.getTime() + 8 * 60 * 60 * 1000)"